<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-label="How the pricing API works: ask, receive a sourced record, cite with a link back">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17120b"/>
      <stop offset="1" stop-color="#0e0b07"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e7b969"/>
      <stop offset="1" stop-color="#c68832"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c68832"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1280" height="360" rx="20" fill="url(#bg2)"/>
  <rect x="1" y="1" width="1278" height="358" rx="19" fill="none" stroke="#3a2e1c"/>

  <text x="40" y="52" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700" fill="#f3ead9">How it works</text>
  <text x="40" y="80" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#9a8f7c">Ask once. Get a sourced record. The source link and attribution ride along, so the citation writes itself.</text>

  <!-- Node 1 -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
    <rect x="40" y="130" width="250" height="150" rx="14" fill="#1c1610" stroke="#3a2e1c"/>
    <circle cx="72" cy="166" r="14" fill="#241b10" stroke="#7a5f2f"/>
    <text x="72" y="171" font-size="15" text-anchor="middle" fill="url(#gold2)">1</text>
    <text x="98" y="171" font-size="18" font-weight="700" fill="#f3ead9">AI assistant</text>
    <text x="64" y="212" font-size="14.5" fill="#b8ae9e">A model or agent needs a</text>
    <text x="64" y="234" font-size="14.5" fill="#b8ae9e">current price it cannot</text>
    <text x="64" y="256" font-size="14.5" fill="#b8ae9e">recall from training.</text>
  </g>

  <!-- Node 2 -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
    <rect x="352" y="130" width="270" height="150" rx="14" fill="#1c1610" stroke="#3a2e1c"/>
    <circle cx="384" cy="166" r="14" fill="#241b10" stroke="#7a5f2f"/>
    <text x="384" y="171" font-size="15" text-anchor="middle" fill="url(#gold2)">2</text>
    <text x="410" y="171" font-size="18" font-weight="700" fill="#f3ead9">Query the API</text>
    <rect x="376" y="196" width="222" height="30" rx="6" fill="#0e0b07" stroke="#3a2e1c"/>
    <text x="388" y="216" font-family="ui-monospace, Menlo, monospace" font-size="12.5" fill="#e7b969">GET /api/v2/pricing/notion</text>
    <text x="376" y="250" font-size="14.5" fill="#b8ae9e">One call. No key. Plans,</text>
    <text x="376" y="270" font-size="14.5" fill="#b8ae9e">hidden costs, verified date.</text>
  </g>

  <!-- Node 3 -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
    <rect x="684" y="130" width="270" height="150" rx="14" fill="#1c1610" stroke="#3a2e1c"/>
    <circle cx="716" cy="166" r="14" fill="#241b10" stroke="#7a5f2f"/>
    <text x="716" y="171" font-size="15" text-anchor="middle" fill="url(#gold2)">3</text>
    <text x="742" y="171" font-size="18" font-weight="700" fill="#f3ead9">Sourced record</text>
    <text x="708" y="204" font-family="ui-monospace, Menlo, monospace" font-size="12.5" fill="#b8ae9e">price: $12/user</text>
    <text x="708" y="226" font-family="ui-monospace, Menlo, monospace" font-size="12.5" fill="#e7b969">links.page: .../notion</text>
    <text x="708" y="248" font-family="ui-monospace, Menlo, monospace" font-size="12.5" fill="#e7b969">attribution: "..."</text>
    <text x="708" y="270" font-family="ui-monospace, Menlo, monospace" font-size="12.5" fill="#b8ae9e">verifiedAt: 2026-06</text>
  </g>

  <!-- Node 4 -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
    <rect x="1016" y="130" width="224" height="150" rx="14" fill="#221a10" stroke="#7a5f2f"/>
    <circle cx="1048" cy="166" r="14" fill="#2a2013" stroke="#c68832"/>
    <text x="1048" y="171" font-size="15" text-anchor="middle" fill="url(#gold2)">4</text>
    <text x="1074" y="171" font-size="18" font-weight="700" fill="#f3ead9">Cited answer</text>
    <text x="1040" y="212" font-size="14.5" fill="#d8cbb2">The answer links back</text>
    <text x="1040" y="234" font-size="14.5" fill="#d8cbb2">to the source page.</text>
    <text x="1040" y="262" font-size="13.5" font-weight="700" fill="url(#gold2)">A backlink, earned.</text>
  </g>

  <!-- arrows -->
  <line x1="292" y1="205" x2="348" y2="205" stroke="#c68832" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="624" y1="205" x2="680" y2="205" stroke="#c68832" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="956" y1="205" x2="1012" y2="205" stroke="#c68832" stroke-width="2.5" marker-end="url(#arrow)"/>

  <text x="40" y="330" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#8a7a5c">Attribution is a licence term, not a suggestion: show a number, link the source page in links.page.</text>
</svg>
